<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Level Up Marketing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Burbank+Big+Condensed+Black&family=Rajdhani:wght@500;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
      /* Custom font simulation for "Fortnite-ish" look if Burbank isn't available, fall back to sans-serif */
      @font-face {
        font-family: 'GamingHeader';
        src: local('Impact'), local('Arial Black');
        /* In a real app, you'd load a specific font file like Burbank Big Condensed */
      }
      
      body {
        margin: 0;
        overflow: hidden; /* Prevent scrolling */
        background-color: #0f172a;
        font-family: 'Rajdhani', sans-serif;
      }

      .font-gaming {
        font-family: 'GamingHeader', sans-serif;
        letter-spacing: 0.05em;
      }
      
      /* 3D Floor Grid Animation */
      .perspective-container {
        perspective: 1000px;
        overflow: hidden;
      }
      .floor-grid {
        transform: rotateX(60deg) scale(2);
        background-size: 100px 100px;
        animation: grid-move 20s linear infinite;
        transform-origin: center top;
      }
      
      @keyframes grid-move {
        0% { background-position: 0 0; }
        100% { background-position: 0 100px; }
      }

      /* Character Breathing Animation */
      .breathing {
        animation: breathe 4s ease-in-out infinite;
      }
      @keyframes breathe {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      /* Glow effects */
      .glow-text {
        text-shadow: 0 0 10px rgba(59, 130, 246, 0.8);
      }

      /* Environment Animations */
      @keyframes snowfall {
        0% { transform: translateY(-10vh) translateX(0); opacity: 0; }
        10% { opacity: 1; }
        100% { transform: translateY(110vh) translateX(20px); opacity: 0; }
      }

      @keyframes firefly-float {
        0%, 100% { transform: translate(0, 0); opacity: 0.5; }
        25% { transform: translate(15px, -15px); opacity: 1; }
        50% { transform: translate(-10px, 20px); opacity: 0.5; }
        75% { transform: translate(-20px, -5px); opacity: 0.8; }
      }

      @keyframes traffic-move {
        0% { transform: translateX(-100%) skewX(-20deg); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateX(200%) skewX(-20deg); opacity: 0; }
      }
      
      @keyframes matrix-fall {
        0% { transform: translateY(-100%); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(110vh); opacity: 0; }
      }

      @keyframes monkey-jump {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-60px); }
      }

      @keyframes sandstorm-move {
        0% { transform: translateX(-50%); opacity: 0.4; }
        50% { opacity: 0.7; }
        100% { transform: translateX(0%); opacity: 0.4; }
      }

      @keyframes blizzard-move {
        0% { transform: translateY(-10vh) translateX(-20vw); opacity: 0; }
        20% { opacity: 1; }
        100% { transform: translateY(110vh) translateX(20vw); opacity: 0; }
      }

      .animate-snow { animation: snowfall linear infinite; }
      .animate-blizzard { animation: blizzard-move linear infinite; }
      .animate-firefly { animation: firefly-float ease-in-out infinite alternate; }
      .animate-traffic { animation: traffic-move linear infinite; }
      .animate-matrix { animation: matrix-fall linear infinite; }
      .animate-jump { animation: monkey-jump 1.5s ease-in-out infinite; }
      .animate-sandstorm { animation: sandstorm-move 3s linear infinite; }

    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
